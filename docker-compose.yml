services:
  postgres:
    image: postgres:16
    container_name: knowledge-postgres
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: knowledge-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://knowledge:knowledge@postgres:5432/knowledge
      STORAGE_DIR: /app/storage
      CORS_ORIGINS: '["http://localhost:3000"]'
      DEFAULT_CHUNK_SIZE: "1200"
      DEFAULT_CHUNK_OVERLAP: "200"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: document_chunks
      EMBEDDING_PROVIDER: fastembed
      EMBEDDING_MODEL_NAME: BAAI/bge-small-en-v1.5
      EMBEDDING_DIMENSION: "384"
      EMBEDDING_BATCH_SIZE: "64"
      RERANKING_ENABLED: "true"
      RERANK_TOP_N: "24"
      RERANK_PROVIDER: local_embedding
      RERANK_MODEL_NAME: embedding-similarity-v1
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: knowledge-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  backend_storage:
  frontend_node_modules:
